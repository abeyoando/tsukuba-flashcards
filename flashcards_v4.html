<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import{getAuth,signInWithPopup,signOut,GoogleAuthProvider,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc}from"https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

// ===== Firebase Config (placeholder — will be replaced after project creation) =====
const firebaseConfig={apiKey:"AIzaSyBQhm0I57uKQaqWJgOCkkAF_HkoZbSPV3o",authDomain:"tsukuba-flashcards.firebaseapp.com",projectId:"tsukuba-flashcards",storageBucket:"tsukuba-flashcards.firebasestorage.app",messagingSenderId:"809999771394",appId:"1:809999771394:web:9b8bbdd3e081f9eb04441b"};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

// Expose to global scope for inline onclick handlers
window._fbAuth=auth;
window._fbDb=db;
window._fbProvider=provider;
window._fbSignInWithPopup=signInWithPopup;
window._fbSignOut=signOut;
window._fbDoc=doc;
window._fbGetDoc=getDoc;
window._fbSetDoc=setDoc;

// Auth state listener
onAuthStateChanged(auth,(user)=>{
  window._fbUser=user;
  const authBar=document.getElementById('auth-bar');
  const appWrap=document.getElementById('app-wrap');
  if(user){
    authBar.innerHTML=`<span class="auth-name">${user.displayName||user.email}</span><button class="auth-btn" onclick="fbLogout()">ログアウト</button>`;
    appWrap.style.display='';
    // Load history from Firestore
    window.loadHistoryFromCloud&&window.loadHistoryFromCloud();
  }else{
    authBar.innerHTML=`<button class="auth-btn auth-login" onclick="fbLogin()">Googleでログイン</button>`;
    appWrap.style.display='none';
  }
});
</script>
<style>

body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

<!-- Google検索用フォーム（form submit は sandbox 制限なし） -->
<form id="gf" action="https://www.google.com/search" method="GET" target="_blank" style="display:none">
  <input id="gq" name="q" type="hidden">
</form>

<script>
function gSearch(q){ document.getElementById('gq').value=q; document.getElementById('gf').submit(); }

// TTS
let synth=window.speechSynthesis, voiceEN=null;
function loadVoice(){const vs=synth.getVoices();voiceEN=vs.find(v=>v.lang.startsWith('en-US')&&v.localService)||vs.find(v=>v.lang.startsWith('en-'))||null;}
if(synth.onvoiceschanged!==undefined)synth.onvoiceschanged=loadVoice;
loadVoice();
function speak(text,btn){
  if(!synth)return;synth.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang='en-US';u.rate=0.85;u.pitch=1;
  if(voiceEN)u.voice=voiceEN;
  if(btn){btn.classList.add('speaking');u.onend=()=>btn.classList.remove('speaking');u.onerror=()=>btn.classList.remove('speaking');}
  synth.speak(u);
}

// Auth helpers
function fbLogin(){
  if(!window._fbAuth||!window._fbProvider)return;
  window._fbSignInWithPopup(window._fbAuth,window._fbProvider).catch(e=>alert('ログインエラー: '+e.message));
}
function fbLogout(){
  if(!window._fbAuth)return;
  window._fbSignOut(window._fbAuth).then(()=>{history=[];});
}

// History — Firestore synced
const HIST_KEY='fc-history';
let history=[];
let _saving=false;

function loadHistory(){
  try{const r=localStorage.getItem(HIST_KEY);return r?JSON.parse(r):[];}catch(e){return[];}
}
function saveHistory(){
  try{localStorage.setItem(HIST_KEY,JSON.stringify(history));}catch(e){}
  saveHistoryToCloud();
}

async function loadHistoryFromCloud(){
  const user=window._fbUser;
  if(!user||!window._fbDb)return;
  try{
    const ref=window._fbDoc(window._fbDb,'flashcard_history',user.uid);
    const snap=await window._fbGetDoc(ref);
    if(snap.exists()){
      history=snap.data().records||[];
      localStorage.setItem(HIST_KEY,JSON.stringify(history));
    }else{
      // First login: push any existing localStorage data to cloud
      history=loadHistory();
      if(history.length)saveHistoryToCloud();
    }
  }catch(e){console.error('Cloud load error:',e);history=loadHistory();}
  // Re-render if on history view
  if(typeof currentMode!=='undefined'&&currentMode==='history'){
    renderHistory(document.getElementById('app-main'));
  }
  updateStats();
}
window.loadHistoryFromCloud=loadHistoryFromCloud;

async function saveHistoryToCloud(){
  const user=window._fbUser;
  if(!user||!window._fbDb||_saving)return;
  _saving=true;
  try{
    const ref=window._fbDoc(window._fbDb,'flashcard_history',user.uid);
    await window._fbSetDoc(ref,{records:history,updatedAt:new Date().toISOString()},{merge:true});
  }catch(e){console.error('Cloud save error:',e);}
  _saving=false;
}

history=loadHistory();
function recordResult(){
  const tot=stats.ok+stats.again;if(!tot)return;
  const pct=Math.round(stats.ok/tot*100);
  const now=new Date();
  history.unshift({id:now.getTime(),deck:currentDeck,deckLabel:DECK_LABELS[currentDeck],total:tot,ok:stats.ok,again:stats.again,pct,
    date:now.toLocaleDateString('ja-JP',{year:'numeric',month:'2-digit',day:'2-digit'}),
    time:now.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'})});
  if(history.length>100)history=history.slice(0,100);
  saveHistory();
}
function deleteHist(id){history=history.filter(h=>h.id!==id);saveHistory();renderHistory(document.getElementById('app-main'));}
function clearAllHist(){if(!confirm('全ての記録を削除しますか？'))return;history=[];saveHistory();renderHistory(document.getElementById('app-main'));}
</script>
<script src="cards.js"></script>
<script>
// ---- アプリロジック（続き） ----
let currentDeck='all',currentMode='flash',cards=[],idx=0,flipped=false;
let stats={ok:0,again:0};

function expandCards(raw){
  const out=[];
  for(const c of raw){
    const parts=c.en.split(' / ');
    if(parts.length===1){out.push(c);continue;}
    const kp=c.kata?c.kata.split(' / '):[];
    const jp=c.ja.split(' / ');
    for(let i=0;i<parts.length;i++){
      out.push({...c,en:parts[i].trim(),kata:kp[i]?kp[i].trim():c.kata,ja:jp[i]?jp[i].trim():c.ja,_group:c.en});
    }
  }
  return out;
}
function getCount(deck){return expandCards(deck==='all'?C:C.filter(c=>c.d===deck)).length;}
function updateDeckCounts(){
  document.querySelectorAll('.deck-btn[data-deck]').forEach(btn=>{
    const d=btn.getAttribute('data-deck');
    btn.textContent=(DECK_LABELS[d]||d)+' ('+getCount(d)+')';
  });
}
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function updateStats(){
  document.getElementById('stat-remain').textContent=Math.max(0,cards.length-idx);
  document.getElementById('stat-ok').textContent=stats.ok;
  document.getElementById('stat-again').textContent=stats.again;
}
function selectDeck(deck,btn){
  currentDeck=deck;
  document.querySelectorAll('.deck-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  initDeck();
}
function setMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn,.hist-nav').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  const m=document.getElementById('app-main');
  m.style.justifyContent=(mode==='flash')?'center':'flex-start';
  m.style.paddingTop='1.5rem';
  if(mode==='history')renderHistory(m);
  else render();
}
function initDeck(){
  cards=expandCards(currentDeck==='all'?[...C]:C.filter(c=>c.d===currentDeck));
  shuffle(cards);idx=0;flipped=false;stats={ok:0,again:0};updateStats();render();
}
function render(){if(currentMode==='list')renderList(document.getElementById('app-main'));else renderFlash(document.getElementById('app-main'));}

function buildDerivHTML(deriv,dark){
  if(!deriv||!deriv.length)return'';
  const rows=deriv.map(d=>{
    if(dark) return`<div class="deriv-row"><span class="deriv-tag tag-${d.t}">${TAG_LABEL[d.t]}</span><span class="deriv-words">${d.w}</span></div>`;
    return`<div class="li-deriv-row"><span class="li-tag li-tag-${d.t}">${TAG_LABEL[d.t]}</span><span class="li-dw">${d.w}</span></div>`;
  }).join('');
  return dark?`<div class="deriv-section">${rows}</div>`:`<div class="li-deriv">${rows}</div>`;
}

// 検索キーワードを抽出する（日本語の括弧・説明を除去）
function extractJaKey(ja){return ja.replace(/（[^）]*）/g,'').split('・')[0].split('/')[0].trim();}
function extractEnKey(en){return en.split('/')[0].trim();}

function renderFlash(main){
  if(idx>=cards.length){renderComplete(main);return;}
  const c=cards[idx];
  const pct=Math.round(idx/cards.length*100);
  const label=DECK_LABELS[c.d]||c.d;
  const siblings=c._group?c._group.split(' / ').filter(s=>s.trim()!==c.en.trim()):[];
  const sibFront=siblings.length?`<div class="sibling-note">同グループ：${siblings.join(' / ')}</div>`:'';
  const sibBack=siblings.length?`<div class="sibling-back">同グループ：<span>${siblings.join(' / ')}</span></div>`:'';
  const jaKey=extractJaKey(c.ja);
  const enKey=extractEnKey(c.en);

  main.innerHTML=`
    <div class="progress-wrap">
      <div class="progress-info"><span>${idx+1} / ${cards.length}</span><span>${pct}% 完了</span></div>
      <div class="progress-bar-outer"><div class="progress-bar-inner" style="width:${pct}%"></div></div>
    </div>
    <div class="card-scene">
      <div class="card-wrap" id="cw" onclick="flipCard()">
        <div class="card-face card-front">
          <div class="card-category">${label}</div>
          <div class="card-term">${c.en}</div>
          <div class="pron-row">
            <span class="card-kata">${c.kata}</span>
            <button class="speak-btn" id="sf" onclick="event.stopPropagation();speakFront()" title="発音">🔊 発音</button>
          </div>
          ${sibFront}
          <div class="card-hint">タップして裏返す</div>
        </div>
        <div class="card-face card-back">
          <div class="back-head">
            <span class="back-category">${label}</span>
            <button class="back-speak" onclick="event.stopPropagation();speakFront()">🔊 再生</button>
          </div>
          <div class="card-def">${c.ja}</div>
          <div class="gsearch-row" id="gsr"></div>
          ${c.ex?`<div class="card-ex">${c.ex}</div>`:''}
          ${sibBack}
          ${buildDerivHTML(c.deriv,true)}
        </div>
      </div>
    </div>
    <div class="action-row" id="ar" style="display:none">
      <button class="act-btn btn-again" onclick="rate('again')">✕<small>もう一度</small></button>
      <button class="act-btn btn-good"  onclick="rate('good')">○<small>正解</small></button>
      <button class="act-btn btn-easy"  onclick="rate('easy')">◎<small>完璧</small></button>
    </div>
    <div class="nav-row">
      <button class="nav-btn" onclick="prev()" ${idx===0?'disabled':''}>← 前へ</button>
      <button class="shuffle-btn" onclick="reshuffleAll()">🔀 シャッフル</button>
      <button class="nav-btn" onclick="skip()">スキップ →</button>
    </div>`;

  // 検索ボタンをDOMに直接追加（テンプレートリテラル外 → 文字エスケープ問題なし）
  const gsr=document.getElementById('gsr');
  if(gsr){
    const b1=document.createElement('button');
    b1.className='gsearch-submit';
    b1.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v2.94h5.35C16.8 16.32 14.66 17.6 12 17.6c-3.09 0-5.6-2.51-5.6-5.6s2.51-5.6 5.6-5.6c1.43 0 2.73.54 3.72 1.42l2.2-2.2C16.27 4.07 14.25 3.2 12 3.2 7.18 3.2 3.2 7.18 3.2 12s3.98 8.8 8.8 8.8c5.09 0 8.47-3.58 8.47-8.63 0-.58-.06-1.14-.12-1.07z"/></svg>'+jaKey;
    b1.onclick=function(e){e.stopPropagation();gSearch(jaKey);};
    const b2=document.createElement('button');
    b2.className='gsearch-submit';
    b2.innerHTML='<svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M21.35 11.1H12v2.94h5.35C16.8 16.32 14.66 17.6 12 17.6c-3.09 0-5.6-2.51-5.6-5.6s2.51-5.6 5.6-5.6c1.43 0 2.73.54 3.72 1.42l2.2-2.2C16.27 4.07 14.25 3.2 12 3.2 7.18 3.2 3.2 7.18 3.2 12s3.98 8.8 8.8 8.8c5.09 0 8.47-3.58 8.47-8.63 0-.58-.06-1.14-.12-1.07z"/></svg>'+enKey+' (EN)';
    b2.onclick=function(e){e.stopPropagation();gSearch(enKey+' medical');};
    gsr.appendChild(b1);
    gsr.appendChild(b2);
  }

  flipped=false;updateStats();
  setTimeout(()=>speakFront(),300);
}

function speakFront(){if(idx>=cards.length)return;const text=cards[idx].en.split('/')[0].trim();speak(text,document.getElementById('sf'));}
function flipCard(){const cw=document.getElementById('cw');if(!cw)return;flipped=!flipped;cw.classList.toggle('flipped',flipped);if(flipped)document.getElementById('ar').style.display='flex';}
function rate(r){if(r==='again'){stats.again++;cards.push(cards[idx]);}else{stats.ok++;}idx++;flipped=false;render();}
function skip(){idx++;flipped=false;render();}
function prev(){if(idx>0){idx--;flipped=false;render();}}
function reshuffleAll(){initDeck();}

function renderList(main){
  const filtered=expandCards(currentDeck==='all'?C:C.filter(c=>c.d===currentDeck));
  main.style.justifyContent='flex-start';
  main.innerHTML=`<div class="list-wrap">
    <div style="font-size:11px;color:var(--ink3);margin-bottom:9px;">全 ${filtered.length} 語 ― タップして表示 / 🔍 でGoogle検索</div>
    <div class="list-grid" id="list-grid"></div>
  </div>`;
  const grid=document.getElementById('list-grid');
  filtered.forEach(c=>{
    const jaKey=extractJaKey(c.ja);
    const enKey=extractEnKey(c.en);
    const item=document.createElement('div');
    item.className='list-item';
    item.innerHTML=`
      <div class="li-top">
        <span class="li-en">${c.en}</span>
        <span class="li-kata">${c.kata}</span>
        <button class="li-speak" onclick="event.stopPropagation();speak('${c.en.split('/')[0].trim().replace(/'/g,"\'")}',this)">🔊</button>
      </div>
      <div class="li-cat">${DECK_LABELS[c.d]||c.d}</div>
      <div class="li-def">${c.ja}</div>
      <div class="li-ex" style="display:none">${c.ex||''}</div>
      ${buildDerivHTML(c.deriv,false)}`;
    // 検索ボタンをDOM APIで追加（文字列埋め込みなし）
    const defEl=item.querySelector('.li-def');
    const sb1=document.createElement('button');
    sb1.className='li-gsearch-submit';
    sb1.textContent='🔍 日本語';
    sb1.onclick=function(e){e.stopPropagation();gSearch(jaKey);};
    const sb2=document.createElement('button');
    sb2.className='li-gsearch-submit';
    sb2.textContent='🔍 英語';
    sb2.onclick=function(e){e.stopPropagation();gSearch(enKey+' medical');};
    defEl.appendChild(sb1);
    defEl.appendChild(sb2);
    item.onclick=()=>item.classList.toggle('revealed');
    grid.appendChild(item);
  });
}

function renderComplete(main){
  const tot=stats.ok+stats.again;
  const pct=tot>0?Math.round(stats.ok/tot*100):0;
  recordResult();
  const col=pct>=80?'var(--green)':pct>=60?'var(--amber)':'var(--red)';
  main.innerHTML=`<div class="complete-card">
    <div class="complete-icon">${pct>=80?'🎉':pct>=60?'👍':'💪'}</div>
    <div class="complete-title">デッキ完了！</div>
    <div class="complete-sub">「${DECK_LABELS[currentDeck]}」を完了しました。<br>結果は記録に保存されました。</div>
    <div class="score-row">
      <div class="score-item"><div class="score-num" style="color:var(--green)">${stats.ok}</div><div class="score-lbl">正解</div></div>
      <div class="score-item"><div class="score-num" style="color:var(--red)">${stats.again}</div><div class="score-lbl">要復習</div></div>
      <div class="score-item"><div class="score-num" style="color:${col}">${pct}%</div><div class="score-lbl">正答率</div></div>
    </div>
    <div class="complete-btns">
      <button class="restart-btn" onclick="reshuffleAll()">もう一度 🔄</button>
      <button class="restart-btn" style="background:var(--ink2)" onclick="setMode('history',document.getElementById('hist-nav-btn'))">記録を見る 📊</button>
    </div>
  </div>`;}

function renderHistory(main){
  main.style.justifyContent='flex-start';
  const avg=history.length?Math.round(history.reduce((s,h)=>s+h.pct,0)/history.length):0;
  const best=history.length?Math.max(...history.map(h=>h.pct)):0;
  let html=`<div class="hist-panel">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:7px;">
      <div>
        <div style="font-size:14px;font-weight:500;">学習記録</div>
        ${history.length?`<div style="font-size:11px;color:var(--ink3);margin-top:2px;">${history.length}回 ― 平均 <strong style="color:var(--acc)">${avg}%</strong> ― 最高 <strong style="color:var(--green)">${best}%</strong></div>`:''}
      </div>
      ${history.length?`<button class="hist-clear" onclick="clearAllHist()">🗑 全削除</button>`:''}
    </div>`;
  if(!history.length){html+=`<div class="hist-empty">まだ記録がありません。<br>デッキを完了すると自動保存されます。</div>`;}
  else{history.forEach(h=>{
    const col=h.pct>=80?'var(--green)':h.pct>=60?'var(--amber)':'var(--red)';
    html+=`<div class="hist-item">
      <div style="flex:1;min-width:120px;">
        <div class="hist-date">${h.date} ${h.time}</div>
        <div class="hist-deck">${h.deckLabel}</div>
        <div style="font-size:10px;color:var(--ink3);">正解 ${h.ok} / 復習 ${h.again}</div>
      </div>
      <div style="display:flex;align-items:center;gap:7px;">
        <div class="hist-bar-wrap"><div class="hist-bar" style="width:${h.pct}%;background:${col}"></div></div>
        <div class="hist-pct" style="color:${col}">${h.pct}%</div>
      </div>
      <button class="hist-del" onclick="deleteHist(${h.id})">✕</button>
    </div>`;})}
  html+='</div>';
  main.innerHTML=html;
}

updateDeckCounts();
initDeck();
</script>
</div><!-- /app-wrap -->
</body>
</html>
